<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Admin Dashboard{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>

<body class="bg-gradient-to-br from-gray-100 to-gray-200 min-h-screen">

  <!-- Navbar -->
  <nav class="bg-gradient-to-r from-pink-500 via-red-500 to-yellow-500 text-white px-6 py-4 flex justify-between items-center shadow-lg rounded-b-2xl">

    <!-- Left: Dashboard Title -->
    <div class="text-2xl font-bold tracking-wide">
      Admin Dashboard
    </div>

    <!-- Right: Logout -->
    <div>
      <a href="{% url 'logout' %}" 
         class="flex items-center space-x-2 bg-white/20 px-4 py-2 rounded-full hover:bg-white hover:text-red-500 transition duration-300">
        <i class="fas fa-sign-out-alt"></i>
        <span>Logout</span>
      </a>
    </div>

  </nav>

  <!-- Main Content -->
  <div class="p-6">
    <div class="bg-white shadow-xl rounded-2xl p-6">
      {% block content %}
      {% endblock %}
    </div>
  </div>

</body>
</html>
